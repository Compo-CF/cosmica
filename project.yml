name: Cosmica
options:
  bundleIdPrefix: com.centricfiber
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ALWAYS_SEARCH_USER_PATHS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: "7H5T5AR2X5"
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"
targets:
  Cosmica:
    type: application
    platform: iOS
    sources:
      - path: Cosmica
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
          - "**/*.entitlements"
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Cosmica
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "3"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserTrackingUsageDescription: "Cosmica uses your identifier to show more relevant ads and support the game."
        GADApplicationIdentifier: "ca-app-pub-1927040492403163~7701480321"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: Cosmica
        PRODUCT_BUNDLE_IDENTIFIER: com.centricfiber.cosmica
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    entitlements:
      path: Generated/Cosmica.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.centricfiber.cosmica
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.game-center: true
  CosmicaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CosmicaTests
    dependencies:
      - target: Cosmica
    settings:
      base:
        PRODUCT_NAME: CosmicaTests
