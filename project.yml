name: Cosmica
options:
  bundleIdPrefix: com.centricfiber
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: "7H5T5AR2X5"
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"
targets:
  Cosmica:
    type: application
    platform: iOS
    sources:
      - path: Cosmica
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Cosmica/Resources
    info:
      path: Cosmica/Resources/Info.plist
      properties:
        CFBundleDisplayName: Cosmica
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSUserTrackingUsageDescription: "Cosmica uses your identifier to show more relevant ads and support the game."
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        SKAdNetworkItems: []
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.centricfiber.cosmica
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    entitlements:
      path: Cosmica/Cosmica.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.centricfiber.cosmica
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
        aps-environment: development
        com.apple.developer.game-center: true
  CosmicaTests:
    type: bundle.unit-test
    platform: iOS
    sources: CosmicaTests
    dependencies:
      - target: Cosmica
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cosmica.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Cosmica"
schemes:
  Cosmica:
    build:
      targets:
        Cosmica: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CosmicaTests
    archive:
      config: Release
